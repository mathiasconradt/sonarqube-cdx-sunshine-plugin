name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode package

      - name: Upload plugin JAR (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-sbom-visualization-plugin
          path: target/sonarqube-cdx-sunshine-plugin-*.jar
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/sonarqube-cdx-sunshine-plugin-*.jar
          generate_release_notes: true
